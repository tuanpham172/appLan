name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up JDK 21 # Nâng cấp lên Java 21 để fix lỗi "invalid source release"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Hard Clean and Build
        run: |
          # Tìm thư mục code
          APP_PATH=$(find . -maxdepth 1 -type d -not -path '*/.*' | head -n 2 | tail -n 1)
          cd "$APP_PATH"
          
          # Dọn dẹp tàn dư Windows
          rm -rf node_modules package-lock.json dist android
          
          # Cài đặt và đóng gói
          npm install --force
          npm run build --if-present
          
          # Khởi tạo Android bằng Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "AppLan" "com.tuanpham.applan" --web-dir dist || true
          npx cap add android || true
          npx cap copy android
          
          # Build APK với Java 21
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Lỗi: Không tìm thấy thư mục android" && exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/app/build/outputs/apk/debug/*.apk"
