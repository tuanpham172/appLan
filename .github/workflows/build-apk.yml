name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Cập nhật lên bản mới nhất năm 2026

      - name: Hard Clean and Build
        run: |
          # Dùng lệnh này để vào thư mục duy nhất có trong repo mà không cần gõ tên
          cd $(find . -maxdepth 1 -type d -not -path '*/.*' | head -n 2 | tail -n 1)
          echo "Đang ở thư mục: $PWD"
          
          # Dọn dẹp
          rm -rf node_modules package-lock.json dist android
          
          # Cài đặt và Build
          npm install --force
          npm run build --if-present
          
          # Capacitor logic
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "AppLan" "com.tuanpham.applan" --web-dir dist || true
          npx cap add android || true
          npx cap copy android
          
          # Build APK
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Lỗi: Không tạo được thư mục Android" && exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/app/build/outputs/apk/debug/*.apk"
