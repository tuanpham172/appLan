name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Clean and Build
        run: |
          # Vào thẳng thư mục chứa code của sếp
          # Lưu ý: Nếu sếp đã đổi tên thư mục thành không dấu, hãy sửa lại tên ở dưới cho đúng
          cd "greendays---chấm-công-chill-chill"
          
          # Xóa bỏ mọi tàn dư node_modules lỡ có trong thư mục này
          rm -rf node_modules package-lock.json dist android
          
          # Cài đặt sạch
          npm install --force
          
          # Build web
          npm run build --if-present
          
          # Cấu hình Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "AppLan" "com.tuanpham.applan" --web-dir dist || true
          npx cap add android || true
          npx cap copy android
          
          # Build APK
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Lỗi: Thư mục Android không được tạo ra!" && exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/app/build/outputs/apk/debug/*.apk"
