name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Auto-Detect and Build
        run: |
          APP_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" -printf '%h\n' | head -n 1)
          cd "$APP_PATH"
          
          # Xóa bỏ các tàn dư từ Windows để tránh lỗi Native Binding
          rm -rf node_modules package-lock.json
          
          npm install --force
          npm run build --if-present
          
          # Cài đặt Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "AppLan" "com.tuanpham.applan" --web-dir dist || true
          npx cap add android || true
          npx cap copy android
          
          # Build APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/app/build/outputs/apk/debug/*.apk"
