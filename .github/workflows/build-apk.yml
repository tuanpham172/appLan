name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Ultimate Clean and Build
        run: |
          # Tìm đúng thư mục chứa code thực sự (greendays...)
          APP_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" -printf '%h\n' | head -n 1)
          echo "Cất cánh từ thư mục: $APP_PATH"
          cd "$APP_PATH"
          
          # Xóa sạch node_modules lỡ upload từ Windows để tránh lỗi Native Binding
          # Thêm lệnh sudo để đảm bảo xóa sạch mọi file cứng đầu
          rm -rf node_modules package-lock.json dist android
          
          # Cài đặt lại từ đầu bản chuẩn cho Linux
          npm install --force
          
          # Build web
          npm run build --if-present
          
          # Cài đặt Capacitor và build Android
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "AppLan" "com.tuanpham.applan" --web-dir dist || true
          npx cap add android || true
          npx cap copy android
          
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Thư mục Android chưa được tạo!" && exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/app/build/outputs/apk/debug/*.apk"
