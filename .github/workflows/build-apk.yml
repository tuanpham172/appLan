name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Hard Clean and Build
        run: |
          # Tìm thư mục chứa package.json thực sự (ưu tiên gLang2)
          APP_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" -printf '%h\n' | sort -r | head -n 1)
          echo "Building from: $APP_PATH"
          cd "$APP_PATH"
          
          rm -rf node_modules package-lock.json dist android
          
          npm install --force
          npm run build --if-present
          
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "AppLanV2" "com.tuanpham.applanv2" --web-dir dist || true
          npx cap add android || true
          npx cap copy android
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-v2
          path: "**/app/build/outputs/apk/debug/*.apk"
